<html>
<head>
 <title>Virtual Chemistry Lab</title>
 <script src="ss.js" defer></script>
 <link rel="stylesheet" href="file.css">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<h2 align="center">Virtual Chemistry Lab Simulation</h2>
<table border="1" width="100%" height="500">
  <tr>
 <th colspan="3">Lab Workspace</th>
 </tr>
 <tr>
 <td width="30%" valign="top">
 <h3 align="center">Chemicals</h3>
  <p id="hcl" draggable="true" ondragstart="drag(event)">
  <i class="fas fa-vial"></i> Hydrochloric Acid
 </p>
  <p id="naoh" draggable="true" ondragstart="drag(event)">
<i class="fas fa-vial"></i> Sodium Hydroxide
 </p>
 <p id="eth" draggable="true" ondragstart="drag(event)">
 <i class="fas fa-vial"></i> Ethanol
 </p>
 <p id="cuso4" draggable="true" ondragstart="drag(event)">
  <i class="fas fa-vial"></i> Copper Sulfate
 </p>
</td>
 <td width="40%" align="center" valign="middle">
 <h3>Experiment Area</h3>
 <table width="80%" height="250">
 <tr>
 <td ondrop="drop(event)" ondragover="allowDrop(event)" id="zone1">
  Drop Zone 1
 </td>
 </tr>
 <tr>
 <td ondrop="drop(event)" ondragover="allowDrop(event)" id="zone2">
  Drop Zone 2
 </td>
 </tr>
 </table>
 </td>
<td width="30%" valign="top">
 <h3>Beakers & Equipment</h3>
<p id="beaker1" draggable="true" ondragstart="drag(event)">
 <i class="fas fa-flask"></i> Beaker 100ml
 </p>
 <p id="beaker2" draggable="true" ondragstart="drag(event)">
 <i class="fas fa-flask"></i> Beaker 250ml
 </p>
 <p id="testtube" draggable="true" ondragstart="drag(event)">
<i class="fas fa-vial"></i> Test Tube
 </p>
<p id="flask" draggable="true" ondragstart="drag(event)">
 <i class="fas fa-flask"></i> Flask
 </p>
</td>
 </tr>
 <tr>
 <td colspan="3">
 <h3>Observation Area</h3>
<p id="result">(Results will appear here)</p>
 </td>
</tr>
